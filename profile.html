<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人空间 - ciaowenxu-qwqのBlog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <!-- 左侧边栏（和主站一致，无个人空间入口） -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="index.html#home" class="sidebar-link">
                            <i class="fas fa-home"></i>
                            <span>主页</span>
                        </a>
                    </li>
                    <li>
                        <a href="index.html#posts" class="sidebar-link">
                            <i class="fas fa-list"></i>
                            <span>文章</span>
                        </a>
                    </li>
                    <li>
                        <a href="index.html#about" class="sidebar-link">
                            <i class="fas fa-info-circle"></i>
                            <span>介绍</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="kangaroo-icon">🦘</div>
            </div>
        </div>
    </aside>

    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-blog"></i>
                <span>ciaowenxu-qwqのBlog</span>
            </div>
            
            <div class="navbar-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <!-- 个人中心内头像点击返回主站 -->
                <a href="index.html" class="header-avatar" id="profileLink" title="返回主页">
                    <img src="assets/avatar.jpg" alt="头像" class="avatar-img" onerror="this.style.display='none'; this.parentNode.innerHTML='<i class=\'fas fa-user\'></i>'">
                </a>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- 独立个人空间内容 -->
        <section id="profile" class="profile-section">
            <div class="profile-header">
                <h2><i class="fas fa-user-circle"></i> 个人空间</h2>
                <a href="index.html" class="back-to-home">
                    <i class="fas fa-arrow-left"></i> 返回主页
                </a>
            </div>
            <div class="profile-content">
                <div class="profile-avatar-large">
                    <img src="assets/avatar.jpg" alt="头像" class="avatar-img" onerror="this.style.display='none'; this.parentNode.innerHTML='<i class=\'fas fa-user\'></i>'">
                </div>
                <div class="profile-info">
                    <h3>ciaowenxu-qwq</h3>
                    <p class="profile-bio">算法竞赛爱好者 | 前端折腾者 | 静态博客玩家</p>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-number">5</span>
                            <span class="stat-label">篇文章</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">4</span>
                            <span class="stat-label">分类</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">2026</span>
                            <span class="stat-label">入驻年份</span>
                        </div>
                    </div>
                    <div class="profile-links">
                        <a href="#" class="profile-link"><i class="fab fa-github"></i> GitHub</a>
                        <a href="#" class="profile-link"><i class="fas fa-envelope"></i> 联系我</a>
                        <a href="#" class="profile-link"><i class="fas fa-rss"></i> RSS订阅</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 ciaowenxu-qwqのBlog | 使用HTML/CSS/JS构建</p>
        <div class="social-links">
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fas fa-rss"></i></a>
        </div>
    </footer>

    <!-- 复用主站脚本，保证功能统一 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
