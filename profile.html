<!DOCTYPE html>
<html lang="zh-CN">
<head>  
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人空间 - xiaowenxu-qwqのBlog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="index.html" class="sidebar-link">
                            <i class="fas fa-home"></i>
                            <span>主页</span>
                        </a>
                    </li>
                    <li>
                        <a href="index.html#posts" class="sidebar-link">
                            <i class="fas fa-list"></i>
                            <span>文章</span>
                        </a>
                    </li>
                    <li>
                        <a href="index.html#about" class="sidebar-link">
                            <i class="fas fa-info-circle"></i>
                            <span>介绍</span>
                        </a>
                    </li>   
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="kangaroo-icon">🦘</div>
            </div>
        </div>
    </aside>

    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="logo" style="text-decoration:none; color:var(--primary-color);">
                <i class="fas fa-blog"></i>
                <span>xiaowenxu-qwqのBlog</span>
            </a>
            <div class="navbar-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="index.html" class="header-avatar" id="profileLink">
                    <img src="assets/avatar.jpg" alt="头像" class="avatar-img" onerror="this.style.display='none'; this.parentNode.innerHTML='<i class=\'fas fa-user\'></i>'">
                </a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section id="profile" class="profile-section">
            <div class="profile-card">
                <div class="profile-top">
                    <div class="avatar-wrap">
                        <img src="assets/avatar.jpg" alt="头像" class="profile-avatar" id="profileAvatar" onerror="this.src='assets/default-avatar.jpg'">
                        <span class="online-badge"></span>
                    </div>
                    <div class="profile-meta">
                        <h2 class="profile-name" id="profileUsername">xiaowenxu-qwq</h2>
                        <p class="profile-bio">算法竞赛爱好者 · 前端折腾者 · 静态博客玩家</p>
                        <div class="profile-social">
                            <a href="https://github.com/xiaowenxu-qwq" target="_blank"><i class="fab fa-github"></i></a>
                            <a href="#"><i class="fas fa-envelope"></i></a>
                            <a href="#"><i class="fas fa-rss"></i></a>
                        </div>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-num" id="statArticles">0</span>
                        <span class="stat-label">篇文章</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-num" id="statCategories">0</span>
                        <span class="stat-label">分类</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-num" id="statTags">0</span>
                        <span class="stat-label">标签</span>
                    </div>
                </div>
                <div class="profile-actions">
                    <a href="index.html" class="action-btn primary">
                        <i class="fas fa-home"></i> 返回主页
                    </a>
                    <a href="#profilePosts" class="action-btn secondary">
                        <i class="fas fa-list"></i> 查看文章
                    </a>
                </div>
            </div>
        </section>

        <section id="profilePosts" class="posts-section">
            <h2><i class="fas fa-list-alt"></i> 我的文章</h2>
            <div id="profileNoResults" class="no-results hidden">
                <i class="fas fa-search"></i>
                <p>未找到匹配的文章</p>
                <span class="no-results-hint">尝试使用其他关键词</span>
            </div>
            <div class="posts-grid" id="profilePostsContainer"></div>
        </section>

        <section id="postDetail" class="post-detail hidden">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i> 返回列表
            </button>
            <div class="post-content" id="postContent"></div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 xiaowenxu-qwqのBlog | 使用HTML/CSS/JS构建</p>
        <div class="social-links">
            <a href="https://github.com/xiaowenxu-qwq/xiaowenxu-qwq.github.io" target="_blank"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fas fa-rss"></i></a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
